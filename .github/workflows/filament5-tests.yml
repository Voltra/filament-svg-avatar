name: Filament v5 tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        stability: [prefer-stable, prefer-lowest]
        laravel: ["12.*", "13.*"]

    name: "${{ matrix.os }} - PHP 8.3 - Laravel ${{ matrix.laravel }} - Filament 5"

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ matrix.os }}-laravel${{ matrix.laravel }}-filament5-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: |
          composer require filament/filament:5.* laravel/framework:${{ matrix.laravel }} --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/pest --ci
